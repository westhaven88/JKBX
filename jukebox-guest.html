<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JKBX — Add a Song</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --deep: #111116;
    --panel: #18181f;
    --border: #2a2a35;
    --amber: #f5a623;
    --amber-dim: #c07d10;
    --green: #1DB954;
    --red: #e84040;
    --text: #e8e8f0;
    --muted: #a0a0b8;
    --card: #1e1e28;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  /* Ambient glow at top */
  body::before {
    content: '';
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(245,166,35,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.96);
    backdrop-filter: blur(12px);
    z-index: 50;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.15em;
    color: var(--amber);
    text-shadow: 0 0 20px rgba(245,166,35,0.3);
  }

  .logo span { color: var(--text); }

  .party-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-align: right;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .party-tag strong {
    display: block;
    color: var(--text);
    font-size: 0.78rem;
  }

  /* Screens */
  .screen { display: none; padding: 0 20px; }
  .screen.active { display: block; }

  /* ── JOIN SCREEN ── */
  #joinScreen.active { display: flex; flex-direction: column; align-items: center; padding: 60px 20px 40px; text-align: center; }

  .join-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.1em;
    color: var(--text);
    margin-bottom: 8px;
  }

  .join-heading .accent { color: var(--amber); }

  .join-sub {
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 40px;
  }

  .join-form {
    width: 100%;
    max-width: 320px;
  }

  .input-group {
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
    text-align: left;
  }

  .big-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.2em;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    text-transform: uppercase;
  }

  .big-input:focus { border-color: var(--amber); box-shadow: 0 0 16px rgba(245,166,35,0.1); }

  .text-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input:focus { border-color: var(--amber); }

  .btn-join {
    width: 100%;
    background: var(--amber);
    border: none;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    padding: 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.03em;
    transition: all 0.2s;
  }

  .btn-join:hover { background: #f7b93a; transform: translateY(-1px); }

  /* ── SEARCH SCREEN ── */
  #searchScreen { padding-top: 20px; }

  .search-hero {
    padding: 20px 0 24px;
    position: relative;
  }

  .welcome-line {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--amber);
    margin-bottom: 6px;
  }

  .welcome-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.06em;
    color: var(--text);
    margin-bottom: 4px;
  }

  .welcome-party {
    font-size: 0.95rem;
    color: var(--muted);
  }

  /* Search box */
  .search-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 16px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }

  .search-box:focus-within { border-color: var(--amber); box-shadow: 0 0 16px rgba(245,166,35,0.1); }

  .search-icon { color: var(--muted); font-size: 1rem; flex-shrink: 0; }

  .search-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 14px 0;
    outline: none;
  }

  .search-input::placeholder { color: var(--muted); }

  .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 4px;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--text); }

  /* Results */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .results-list { display: flex; flex-direction: column; gap: 6px; }

  .result-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    animation: fadeUp 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--amber);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .result-item:hover { border-color: var(--amber-dim); transform: translateX(2px); }
  .result-item:hover::before { opacity: 1; }
  .result-item.added { border-color: var(--green); background: rgba(29,185,84,0.05); }
  .result-item.added::before { opacity: 1; background: var(--green); }

  .result-art {
    width: 48px;
    height: 48px;
    border-radius: 4px;
    background: var(--deep);
    object-fit: cover;
    flex-shrink: 0;
  }

  .result-info { flex: 1; min-width: 0; }

  .result-name {
    font-size: 0.9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .result-meta {
    font-size: 0.85rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-duration {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .add-icon {
    font-size: 1.2rem;
    color: var(--muted);
    flex-shrink: 0;
    transition: color 0.15s, transform 0.15s;
  }

  .result-item:hover .add-icon { color: var(--amber); transform: scale(1.2); }
  .result-item.added .add-icon { color: var(--green); }

  /* Loading spinner */
  .spinner {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
  }

  .spin-ring {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: rotate 0.8s linear infinite;
    margin-right: 12px;
  }

  @keyframes rotate { to { transform: rotate(360deg); } }

  /* Empty / hint */
  .hint {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.8;
  }

  .hint-icon { font-size: 2rem; margin-bottom: 12px; display: block; opacity: 0.5; }

  /* My songs */
  .my-songs {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .submitted-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.3s ease;
  }

  .submitted-art {
    width: 36px;
    height: 36px;
    border-radius: 3px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .submitted-info { flex: 1; min-width: 0; }

  .submitted-name {
    font-size: 0.82rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .submitted-artist {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .submitted-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--green);
    background: rgba(29,185,84,0.1);
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 24px;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    max-width: 90vw;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* Limit warning */
  .limit-banner {
    background: rgba(245,166,35,0.08);
    border: 1px solid var(--amber-dim);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 0.8rem;
    color: var(--amber);
    margin-bottom: 16px;
    display: none;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Search via Claude AI fallback note */
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--deep);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    margin-bottom: 14px;
  }

  .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">JK<span>BX</span></div>
  <div class="party-tag">
    <strong id="headerPartyName">Loading...</strong>
    <span id="headerCode">—</span>
  </div>
</div>

<!-- JOIN SCREEN -->
<div id="joinScreen" class="screen">
  <div class="join-heading"><span class="accent">JOIN</span><br>THE PARTY</div>
  <div class="join-sub">Enter the code from your host to add songs</div>

  <div class="join-form">
    <div class="input-group">
      <label>Party Code</label>
      <input type="text" class="big-input" id="codeInput" placeholder="ABC123" maxlength="6"
        oninput="this.value = this.value.toUpperCase()">
    </div>
    <div class="input-group">
      <label>Your Name (shown to host)</label>
      <input type="text" class="text-input" id="nameInput" placeholder="e.g. Alex">
    </div>
    <button class="btn-join" onclick="joinParty()">Join Party →</button>
  </div>
</div>

<!-- SEARCH SCREEN -->
<div id="searchScreen" class="screen">
  <div class="search-hero">
    <div class="welcome-line">Welcome to the party</div>
    <div class="welcome-name" id="welcomeName">Hey there!</div>
    <div class="welcome-party" id="welcomeParty">—</div>
  </div>

  <div class="limit-banner" id="limitBanner">
    You've added 3 songs — the host may limit requests per guest.
  </div>

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput"
      placeholder="Search for a song or artist..."
      oninput="onSearchInput(this.value)"
      autocomplete="off">
    <button class="clear-btn" onclick="clearSearch()" id="clearBtn" style="display:none">✕</button>
  </div>

  <div id="searchResults">
    <div class="hint">
      <span class="hint-icon">🎵</span>
      Search for any song and add it<br>to the party queue
    </div>
  </div>

  <div class="my-songs" id="mySongsSection" style="display:none;">
    <div class="section-label">Your submissions</div>
    <div id="mySubmissions"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ────────────────────────────────────────────────────────────
let guestState = {
  code: '',
  name: '',
  partyName: '',
  submitted: [],
  searchDebounce: null,
  clientId: '',
  spotifyToken: '',
  pasteId: ''
};

// ── INIT ─────────────────────────────────────────────────────────────
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const party = params.get('party');

  // Restore saved guest state (phone woke up, tab refreshed, etc.)
  if (loadGuestState()) {
    // Update token from URL if fresher one is present
    const tokenParam = params.get('t');
    const pasteParam = params.get('d');
    if (tokenParam && tokenParam.length > 20) guestState.spotifyToken = tokenParam;
    if (pasteParam) guestState.pasteId = pasteParam;
    if (code) guestState.code = code;
    if (party) guestState.partyName = decodeURIComponent(party);
    document.getElementById('headerCode').textContent = guestState.code;
    document.getElementById('headerPartyName').textContent = guestState.partyName || 'Party';
    showSearch();
    renderMySubmissions();
    return;
  }

  // Load host config for Spotify client ID
  const savedConfig = localStorage.getItem('jkbx_config');
  if (savedConfig) {
    try {
      const cfg = JSON.parse(savedConfig);
      guestState.clientId = cfg.clientId || '';
    } catch(e) {}
  }

  // Get Spotify token — from URL param 't' (same device) or dpaste 'd' (other device)
  const tokenParam = params.get('t');
  const pasteParam = params.get('d');
  if (tokenParam && tokenParam.length > 20) {
    guestState.spotifyToken = tokenParam;
  } else if (pasteParam) {
    guestState.pasteId = pasteParam;
    // Token will be fetched lazily when search is triggered
  } else {
    guestState.spotifyToken = localStorage.getItem('jkbx_token') || '';
  }

  // Load saved name
  const savedName = localStorage.getItem('jkbx_guest_name');
  if (savedName) document.getElementById('nameInput').value = savedName;

  if (code) {
    guestState.code = code;
    guestState.partyName = party ? decodeURIComponent(party) : 'Party';
    document.getElementById('codeInput').value = code;
    document.getElementById('headerCode').textContent = code;
    document.getElementById('headerPartyName').textContent = guestState.partyName;

    // Auto-join if name is saved
    if (savedName) {
      guestState.name = savedName;
      showSearch();
      return;
    }
  }

  showScreen('joinScreen');
};

// ── JOIN ─────────────────────────────────────────────────────────────
function joinParty() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const name = document.getElementById('nameInput').value.trim();

  if (code.length < 4) { showToast('Enter a valid party code', 'error'); return; }
  if (!name) { showToast('Enter your name', 'error'); return; }

  guestState.code = code;
  guestState.name = name;
  localStorage.setItem('jkbx_guest_name', name);
  saveGuestState();
  showSearch();
}

function showSearch() {
  document.getElementById('headerCode').textContent = guestState.code;
  document.getElementById('headerPartyName').textContent = guestState.partyName || 'Party';
  document.getElementById('welcomeName').textContent = `Hey, ${guestState.name}!`;
  document.getElementById('welcomeParty').textContent = guestState.partyName || `Party ${guestState.code}`;
  showScreen('searchScreen');
  document.getElementById('searchInput').focus();
}

// ── SCREENS ──────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── SEARCH ───────────────────────────────────────────────────────────
function onSearchInput(val) {
  document.getElementById('clearBtn').style.display = val ? 'block' : 'none';
  clearTimeout(guestState.searchDebounce);
  if (!val.trim()) {
    showHint();
    return;
  }
  guestState.searchDebounce = setTimeout(() => searchSpotify(val.trim()), 400);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  showHint();
}

function showHint() {
  document.getElementById('searchResults').innerHTML = `
    <div class="hint">
      <span class="hint-icon">🎵</span>
      Search for any song and add it<br>to the party queue
    </div>`;
}

async function searchSpotify(query) {
  showLoading();

  // Use token already fetched, or try to get it from JSONBin
  let token = guestState.spotifyToken || '';

  if (!token || token.length < 20) {
    token = await fetchPartyToken();
    if (token) guestState.spotifyToken = token;
  }

  if (token && token.length > 20) {
    await searchViaSpotify(query, token);
  } else {
    await searchViaMusicBrainz(query);
  }
}

async function fetchPartyToken() {
  // Token is in URL param 't' — read it directly, no external service needed
  if (guestState.spotifyToken && guestState.spotifyToken.length > 20) {
    return guestState.spotifyToken;
  }
  // Try reading fresh from current URL (in case state was restored without token)
  const params = new URLSearchParams(window.location.search);
  const t = params.get('t');
  if (t && t.length > 20) {
    guestState.spotifyToken = t;
    return t;
  }
  return '';
}

async function searchViaSpotify(query, token) {
  try {
    const url = `https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=8`;
    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (res.status === 401) {
      // Token expired — fall back
      await searchViaMusicBrainz(query);
      return;
    }

    const data = await res.json();
    const items = data?.tracks?.items || [];

    if (items.length === 0) {
      document.getElementById('searchResults').innerHTML =
        `<div class="hint">No results found — try a different search</div>`;
      return;
    }

    const tracks = items.map(t => ({
      id: t.id,
      name: t.name,
      artist: t.artists.map(a => a.name).join(', '),
      album: t.album.name,
      duration_ms: t.duration_ms,
      albumArt: t.album.images?.[1]?.url || t.album.images?.[0]?.url || '',
      uri: t.uri
    }));

    renderResults(tracks);
  } catch(e) {
    await searchViaMusicBrainz(query);
  }
}

async function searchViaMusicBrainz(query) {
  // MusicBrainz API — truly open, no key, good CORS support
  try {
    // Search by artist name first for best results
    const artistUrl = `https://musicbrainz.org/ws/2/artist/?query=${encodeURIComponent(query)}&limit=1&fmt=json`;
    const artistRes = await fetch(artistUrl, {
      headers: { 'User-Agent': 'JKBX-Party-App/1.0 (https://westhaven88.github.io/JKBX)' }
    });
    const artistData = await artistRes.json();
    const artistId = artistData?.artists?.[0]?.id;

    let recordings = [];
    if (artistId) {
      // Get top recordings by this artist
      const recUrl = `https://musicbrainz.org/ws/2/recording/?query=arid:${artistId}&limit=12&fmt=json`;
      const recRes = await fetch(recUrl, {
        headers: { 'User-Agent': 'JKBX-Party-App/1.0 (https://westhaven88.github.io/JKBX)' }
      });
      const recData = await recRes.json();
      recordings = recData?.recordings || [];
    }

    // Fallback: search by title if no artist found
    if (!recordings.length) {
      const url = `https://musicbrainz.org/ws/2/recording/?query=${encodeURIComponent(query)}&limit=10&fmt=json`;
      const res2 = await fetch(url, {
        headers: { 'User-Agent': 'JKBX-Party-App/1.0 (https://westhaven88.github.io/JKBX)' }
      });
      const data2 = await res2.json();
      recordings = data2?.recordings || [];
    }

    if (!recordings.length) {
      document.getElementById('searchResults').innerHTML =
        `<div class="hint">No results found — try a different search</div>`;
      return;
    }

    // Deduplicate by title and sort by popularity (most releases = most popular)
    const seen = new Set();
    const tracks = recordings
      .filter(r => { const key = r.title.toLowerCase(); if (seen.has(key)) return false; seen.add(key); return true; })
      .slice(0, 8)
      .map((r, i) => {
        const artist = r['artist-credit']?.[0]?.artist?.name || r['artist-credit']?.[0]?.name || 'Unknown';
        const release = r.releases?.[0];
        return {
          id: r.id || ('mb-' + i),
          name: r.title,
          artist: artist,
          album: release?.title || '',
          duration_ms: r.length || 210000,
          albumArt: '',
          uri: null
        };
      });

    renderResults(tracks, true);
  } catch(e) {
    document.getElementById('searchResults').innerHTML = `
      <div class="hint" style="color:var(--red);">
        <span class="hint-icon">⚠️</span>
        Search unavailable.<br>Try scanning the QR code again from the host screen.
      </div>`;
  }
}

function showLoading() {
  document.getElementById('searchResults').innerHTML = `
    <div class="spinner">
      <div class="spin-ring"></div>
      Searching...
    </div>`;
}

function renderResults(tracks) {
  if (!tracks.length) {
    document.getElementById('searchResults').innerHTML = `
      <div class="hint">No results found for that search</div>`;
    return;
  }

  const addedIds = new Set(guestState.submitted.map(t => t.id));

  document.getElementById('searchResults').innerHTML = `
    <div class="ai-badge"><div class="ai-dot"></div> iTunes search</div>
    <div class="section-label">Results</div>
    <div class="results-list">
      ${tracks.map(track => `
        <div class="result-item ${addedIds.has(track.id) ? 'added' : ''}" id="ri-${track.id}" onclick="addTrack(${JSON.stringify(track).replace(/"/g, '&quot;')})">
          <img class="result-art" src="${track.albumArt}" alt="" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 1 1\'%3E%3Crect fill=\'%2318181f\'/%3E%3C/svg%3E'">
          <div class="result-info">
            <div class="result-name">${escHtml(track.name)}</div>
            <div class="result-meta">${escHtml(track.artist)} · ${escHtml(track.album || '')}</div>
          </div>
          <span class="result-duration">${formatDuration(track.duration_ms)}</span>
          <span class="add-icon">${addedIds.has(track.id) ? '✓' : '+'}</span>
        </div>
      `).join('')}
    </div>`;
}

// ── ADD TRACK ────────────────────────────────────────────────────────
async function addTrack(track) {
  if (guestState.submitted.find(t => t.id === track.id)) {
    showToast('Already added!', '');
    return;
  }

  const el = document.getElementById('ri-' + track.id);
  if (el) { el.classList.add('added'); el.querySelector('.add-icon').textContent = '⏳'; }

  showStatus('Step 1: Getting Spotify token...');

  // Get token
  let token = guestState.spotifyToken || '';
  if (!token || token.length < 20) {
    token = await fetchPartyToken();
    if (token) guestState.spotifyToken = token;
  }

  if (!token || token.length < 20) {
    showStatus('❌ No Spotify token found. Ask host to re-share the invite link.', true);
    showToast('No token — ask host to reshare link', 'error');
    if (el) el.querySelector('.add-icon').textContent = '?';
    return;
  }
  showStatus('✓ Token found (' + token.substring(0,8) + '...). Step 2: Finding song on Spotify...');

  // Look up Spotify URI
  let uri = track.uri || null;
  if (!uri) {
    uri = await lookupSpotifyUri(track.name, track.artist, token);
  }

  if (!uri) {
    showStatus('❌ Could not find "' + track.name + '" on Spotify.', true);
    showToast('Song not found on Spotify', 'error');
    if (el) el.querySelector('.add-icon').textContent = '✗';
    return;
  }
  showStatus('✓ Found URI. Step 3: Adding to Spotify queue...');

  const submission = { ...track, uri, submitter: guestState.name, submittedAt: Date.now() };
  guestState.submitted.push(submission);
  saveGuestState();
  if (el) el.querySelector('.add-icon').textContent = '✓';
  renderMySubmissions();

  try {
    const res = await fetch(`https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(uri)}`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (res.status === 204) {
      showStatus('✅ "' + track.name + '" added to Spotify queue!');
      showToast('"' + track.name + '" added to queue! 🎉', 'success');
    } else {
      const errData = await res.json().catch(() => ({}));
      const reason = errData?.error?.reason || errData?.error?.message || ('HTTP ' + res.status);
      showStatus('❌ Spotify error: ' + reason, true);
      showToast('Spotify error: ' + reason, 'error');
    }
  } catch(e) {
    showStatus('❌ Network error: ' + e.message, true);
    showToast('Network error — try again', 'error');
  }

  if (guestState.submitted.length >= 3) {
    document.getElementById('limitBanner').style.display = 'block';
  }
}

async function lookupSpotifyUri(name, artist, token) {
  try {
    const q = encodeURIComponent(`track:${name} artist:${artist}`);
    const res = await fetch(`https://api.spotify.com/v1/search?q=${q}&type=track&limit=1`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    return data?.tracks?.items?.[0]?.uri || null;
  } catch(e) { return null; }
}

function renderMySubmissions() {
  const section = document.getElementById('mySongsSection');
  const list = document.getElementById('mySubmissions');

  if (!guestState.submitted.length) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = guestState.submitted.map(t => `
    <div class="submitted-item">
      <img class="submitted-art" src="${t.albumArt || ''}" alt="" onerror="this.style.background='var(--deep)'">
      <div class="submitted-info">
        <div class="submitted-name">${escHtml(t.name)}</div>
        <div class="submitted-artist">${escHtml(t.artist)}</div>
      </div>
      <span class="submitted-badge">QUEUED</span>
    </div>
  `).join('');
}

// ── GUEST STATE PERSISTENCE ─────────────────────────────────────────
function saveGuestState() {
  try {
    localStorage.setItem('jkbx_guest_state', JSON.stringify({
      code: guestState.code,
      name: guestState.name,
      partyName: guestState.partyName,
      submitted: guestState.submitted,
      spotifyToken: guestState.spotifyToken,
      pasteId: guestState.pasteId
    }));
  } catch(e) {}
}

function loadGuestState() {
  try {
    const saved = localStorage.getItem('jkbx_guest_state');
    if (!saved) return false;
    const s = JSON.parse(saved);
    // Only restore if same party code
    const params = new URLSearchParams(window.location.search);
    const urlCode = params.get('code');
    if (urlCode && s.code !== urlCode) return false;
    if (!s.code || !s.name) return false;
    guestState.code = s.code;
    guestState.name = s.name;
    guestState.partyName = s.partyName || '';
    guestState.submitted = s.submitted || [];
    guestState.spotifyToken = s.spotifyToken || '';
    guestState.pasteId = s.pasteId || '';
    return true;
  } catch(e) { return false; }
}

// ── TOAST ────────────────────────────────────────────────────────────
function showStatus(msg, isError) {
  let bar = document.getElementById('statusBar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'statusBar';
    bar.style.cssText = 'position:fixed;top:70px;left:0;right:0;background:#18181f;border-bottom:1px solid #2a2a35;padding:10px 20px;font-family:monospace;font-size:0.72rem;z-index:500;word-break:break-all;line-height:1.5;';
    document.body.appendChild(bar);
  }
  bar.style.color = isError ? '#e84040' : '#1DB954';
  bar.textContent = msg;
  // Auto-hide after 8 seconds
  clearTimeout(bar._timer);
  bar._timer = setTimeout(() => { if(bar) bar.remove(); }, 8000);
}

let toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── UTILS ────────────────────────────────────────────────────────────
function formatDuration(ms) {
  if (!ms) return '';
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
